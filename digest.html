    document.getElementById('section-grid').innerHTML = '';
    document.getElementById('rail-list').innerHTML = '';
    resultsEl.style.display = '';
    renderSearchResults();
    return;
  }
  resultsEl.style.display = 'none';
  resultsEl.innerHTML = '';
  magazine.style.display = '';

  // Bucket and order by effectiveScore = (score + cluster_boost) × source-
  // affinity so the pipeline-assigned score still dictates the baseline, cross-
  // source coverage lifts a story, and sources you consistently engage with get
  // nudged upward (and dismissed sources down).
  // Collapse same-story coverage: group by cluster, reduce each to one
  // representative, and stash the rest on the rep for the coverage marker +
  // "+N more covering this" disclosure. Applied to both today and the rail.
  // One ranked inbox, split into today (by score) and earlier (carried, by
  // recency). The front page draws today first; if today can't fill it (you've
  // cleared the top), it borrows the best of earlier so no section sits empty.
  const today = dedupeToReps(allArticles.filter(a => isToday(a) && visible(a)))
    .sort((a, b) => effectiveScore(b) - effectiveScore(a));
  const earlier = dedupeToReps(allArticles.filter(a => !isToday(a) && visible(a)))
    .sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

  let front = today;
  if (front.length < FRONT_MIN) front = front.concat(earlier.slice(0, FRONT_MIN - front.length));
  const promoted = new Set(front.map(a => a.id));

  // Magazine front page: top rep is the lead, next four are hero secondaries,
  // the rest is the Latest card grid.
  const lead = front[0] || null;
  const side = front.slice(1, 5);
  const gridCards = front.slice(5);

  // Rail = earlier not promoted, capped to roughly the grid's height so it never
  // runs far past the left column. Dismissing rail items pulls the reserve up
  // (re-render backfills at the end); "Show more" reveals it on demand.
  const railPool = earlier.filter(a => !promoted.has(a.id));
  const railCap = Math.max(RAIL_MIN, gridCards.length);
  const railShown = railShowAll ? railPool : railPool.slice(0, railCap);

  renderHero(lead, side);
  renderGrid(gridCards);
  renderRail(railShown, railPool.length - railShown.length);
}

// Group articles by cluster and return one representative each, with the other
// members attached as `_clusterOthers` for the coverage UI. Singletons (most
// articles) come back unchanged with an empty others list.
function dedupeToReps(list) {
  const byCluster = new Map();
  for (const a of list) {
    const cid = a.cluster_id || a.id;
    if (!byCluster.has(cid)) byCluster.set(cid, []);
    byCluster.get(cid).push(a);
  }
  const reps = [];
  for (const members of byCluster.values()) {
    members.sort((x, y) => effectiveScore(y) - effectiveScore(x));
    const rep = members.find(m => m.cluster_rep) || members[0];
    rep._clusterOthers = members.filter(m => m !== rep);
    reps.push(rep);
  }
  return reps;
}

function relTime(a) {
  const d = new Date(a.published_at), now = Date.now();
  const h = Math.floor((now - d) / 3600000);
  if (isNaN(h)) return '';
  if (h < 1) return 'now';
  if (h < 24) return h + 'h';
  return Math.floor(h / 24) + 'd';
}
function srcLine(a) {
  const t = relTime(a);
  return `<span class="src">${a.source}${t ? ` · <time>${t}</time>` : ''}</span>`;
}
function cardActions(a) {
  return `<div class="card-actions">
      <button class="act later" onclick="saveForLater('${a.id}')">Read later</button>
      <button class="act done" onclick="dismiss('${a.id}')">Done</button>
    </div>`;
}
const openLink = (a, inner) =>
  `<a href="${a.url}" onclick="openArticle('${a.id}','${a.url}'); return false;">${inner}</a>`;

function renderHero(lead, side) {
  const el = document.getElementById('section-hero');
  if (!lead) { el.innerHTML = '<p class="empty">No stories for this filter.</p>'; return; }
  const leadHTML = `
    <article class="article-wrap lead" id="wrap-${lead.id}" style="max-height:9999px;">
      ${thumbBlock(lead)}
      ${kicker(lead)}
      <h2 class="lead-title">${openLink(lead, lead.title)}</h2>
      ${lead.summary ? `<p class="lead-summary">${lead.summary}</p>` : ''}
      ${clusterDisclosure(lead)}
      <div class="lead-foot">${srcLine(lead)} ${cardActions(lead)}</div>
    </article>`;
  const sideHTML = side.map(a => `
    <article class="article-wrap mini" id="wrap-${a.id}" style="max-height:9999px;">
      ${thumbBlock(a)}
      <div>
        ${kicker(a)}
        <h3 class="mini-title">${openLink(a, a.title)}</h3>
        ${clusterDisclosure(a)}
        <div class="mini-foot">${srcLine(a)} ${cardActions(a)}</div>
      </div>
    </article>`).join('');
  el.innerHTML = leadHTML + `<div class="hero-side">${sideHTML}</div>`;
}

function gridCardHTML(a) {
  return `
    <article class="article-wrap card" id="wrap-${a.id}" style="max-height:9999px;">
      ${thumbBlock(a)}
      ${kicker(a)}
      <h3 class="card-title">${openLink(a, a.title)}</h3>
      ${a.summary ? `<p class="card-summary">${a.summary}</p>` : ''}
      ${clusterDisclosure(a)}
      <div class="card-foot">${srcLine(a)} ${cardActions(a)}</div>
    </article>`;
}

function renderGrid(cards) {
  const el = document.getElementById('section-grid');
  if (!cards.length) { el.innerHTML = '<p class="empty">Nothing else in today’s digest.</p>'; return; }
  el.innerHTML = cards.map(gridCardHTML).join('');
}

// A search hit that's already in Read Later. Highlighted, opens in a new tab
// (a search must never silently un-save it, so no openLaterArticle here).
function savedCardHTML(a) {
  const link = `href="${a.url}" target="_blank" rel="noopener"`;
  return `
    <article class="article-wrap card saved-hit" id="saved-hit-${a.id}" style="max-height:9999px;">
      <a ${link}>${thumb(a)}</a>
      <span class="saved-tag">★ Saved</span>
      <h3 class="card-title"><a ${link}>${a.title}</a></h3>
      ${a.bottomLine ? `<p class="card-summary">${escapeAttr(a.bottomLine)}</p>` : ''}
      <div class="card-foot">${srcLine(a)}</div>
    </article>`;
}

function renderRail(articles, hidden = 0) {
  const el = document.getElementById('rail-list');
  if (!articles.length) { el.innerHTML = '<p class="empty" style="padding:8px 0;">All caught up.</p>'; return; }
  const groups = {};
  articles.forEach(a => { const d = articleDate(a); (groups[d] = groups[d] || []).push(a); });
  // A "show more" when the rail is capped, or "show less" once expanded past it.
  const moreCtl = hidden > 0
    ? `<button class="rail-more" onclick="toggleRailMore(true)">Show ${hidden} more</button>`
    : (railShowAll ? `<button class="rail-more" onclick="toggleRailMore(false)">Show less</button>` : '');
  el.innerHTML = Object.entries(groups).map(([day, arts]) => `
    <div class="rail-day">${day}</div>
    ${arts.map(a => `
      <article class="article-wrap rail-item" id="wrap-${a.id}" style="max-height:9999px;">
        <a class="rail-title" href="${a.url}" onclick="openArticle('${a.id}','${a.url}'); return false;">${a.title}</a>
        <div class="rail-meta"><span class="cdot" style="background:${catMeta(a.category).c}"></span><span>${a.source}</span></div>
        ${clusterDisclosure(a)}
        <div class="rail-actions">
          <button class="act later" onclick="saveForLater('${a.id}')">Later</button>
          <button class="act done" onclick="dismiss('${a.id}')">Done</button>
        </div>
      </article>`).join('')}
  `).join('') + moreCtl;
}

window.toggleRailMore = function(showAll) {
  railShowAll = showAll;
  render();
};

/* ── Render Read Later ────────────────────────────────── */
let laterSearchQuery = '';
let historySearchQuery = '';

function escapeAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

// Hides .list-row elements inside container whose title+source don't match
// query. Driven off DOM text rather than the source array so the same helper
// works for both Later and History.
function applyListSearch(containerId, query) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const q = (query || '').trim().toLowerCase();
  let visible = 0, total = 0;
  for (const row of container.querySelectorAll('.list-row')) {
    total++;
    if (!q) { row.style.display = ''; visible++; continue; }
    const title = (row.querySelector('.list-title')?.textContent || '').toLowerCase();
    const source = (row.querySelector('.list-source')?.textContent || '').toLowerCase();
    const match = title.includes(q) || source.includes(q);
    row.style.display = match ? '' : 'none';
    if (match) visible++;
  }
  const empty = container.querySelector('.search-empty');
  if (empty) empty.style.display = (q && total > 0 && visible === 0) ? 'block' : 'none';
}

window.onLaterSearchInput = function(value) {
  laterSearchQuery = value;
  applyListSearch('later-content', value);
};

window.onHistorySearchInput = function(value) {
  historySearchQuery = value;
  applyListSearch('history-content', value);
};

function renderLaterCount() {
  const later = sharedState.later;
  const countEl = document.getElementById('later-count');
  if (countEl) countEl.textContent = `${later.length} article${later.length===1?'':'s'} saved`;
}

/* ── Read Later: TL;DR ────────────────────────────────── */
let tldrOpen = new Set();

// Generate (or regenerate) a TL;DR for a saved item via Ollama and persist it on
// the later item so it syncs across devices. Re-finds the item by id after each
// await because saveSharedState can replace sharedState mid-flight.
async function requestTldr(id, url, title) {
  const set = (fields) => {
    const it = sharedState.later.find(a => a.id === id);
    if (it) Object.assign(it, fields);
  };
  set({ tldrState: 'pending' });
  if (currentView === 'later') renderLater();
  try {
    const res = await fetch('/tldr', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, title }),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const bullets = Array.isArray(data.tldr) ? data.tldr : [];
    set({ tldr: bullets, bottomLine: data.bottom_line || '',
          readMinutes: Number(data.read_minutes) || 0,
          tldrState: (bullets.length || data.bottom_line) ? 'ready' : 'error' });
  } catch (e) {
    set({ tldrState: 'error' });
  }
  saveSharedState().catch(() => {});
  if (currentView === 'later') renderLater();
}

window.toggleTldr = function(id) {
  if (tldrOpen.has(id)) { tldrOpen.delete(id); renderLater(); return; }
  tldrOpen.add(id);
  const it = sharedState.later.find(a => a.id === id);
  // Generate on first open if missing (covers items saved before this feature
  // existed, or a previous failure).
  if (it && !(it.tldr && it.tldr.length) && it.tldrState !== 'pending') {
    requestTldr(id, it.url, it.title);
  } else {
    renderLater();
  }
};

window.retryTldr = function(id) {
  const it = sharedState.later.find(a => a.id === id);
  if (it) { tldrOpen.add(id); requestTldr(id, it.url, it.title); }
};

function tldrToggleBtn(a) {
  const busy = a.tldrState === 'pending' && !(a.tldr && a.tldr.length);
  return `<button class="list-btn tldr-toggle" onclick="toggleTldr('${a.id}')">${
    tldrOpen.has(a.id) ? '▾' : '▸'} ${busy ? 'Summarizing…' : 'TL;DR'}</button>`;
}

function tldrPanel(a) {
  if (!tldrOpen.has(a.id)) return '';
  const regen = (title) =>
    `<button class="tldr-regen-icon" onclick="retryTldr('${a.id}')" title="${title}" aria-label="${title}">↻</button>`;
  let inner;
  if (a.tldr && a.tldr.length) {
    const readMeta = a.readMinutes
      ? `<p class="tldr-read">≈ ${a.readMinutes} min read</p>` : '';
    inner = regen('Regenerate')
      + readMeta
      + `<ul class="tldr-list">${a.tldr.map(b => `<li>${escapeAttr(b)}</li>`).join('')}</ul>`
      + (a.bottomLine ? `<p class="tldr-bottom"><span>Bottom line:</span> ${escapeAttr(a.bottomLine)}</p>` : '');
  } else if (a.tldrState === 'pending') {
    inner = '<p class="tldr-status">Summarizing…</p>';
  } else {
    inner = regen('Retry') + '<p class="tldr-status">Couldn\'t summarize.</p>';
  }
  return `<div class="tldr-panel">${inner}</div>`;
}

function renderLater() {
  const all   = sharedState.later;
  const later = currentCat === 'all' ? all : all.filter(a => a.category === currentCat);
  const el    = document.getElementById('later-content');

  if (all.length === 0) {
    el.innerHTML = '<p class="empty">No articles saved for later.</p>';
    return;
  }

  const sorted = [...later].reverse();
  el.innerHTML = `
    <input type="search" class="list-search" placeholder="Search saved articles…"
           value="${escapeAttr(laterSearchQuery)}"
           oninput="onLaterSearchInput(this.value)">
    <div class="list-meta">
      <span id="later-count">${all.length} article${all.length===1?'':'s'} saved</span>

/* ── Settings: feed management ────────────────────────── */
let feedsList = [];
let feedFormUrl = '';
let feedFormSource = '';
let feedFormCategory = '';
let feedFormStatus = { kind: 'idle', message: '' };

// In-session undo for removals — cleared on page reload, never persisted.
// Each entry is { feed, stats } so we can restore both the feeds.json entry
// and the sourceStats counters that the server wiped on remove.
let recentRemoves = [];

// Sort state for the Feeds table. The "natural" direction is asc for text
// columns and desc for numeric — clicking a column the first time picks that
// direction, clicking the same column again toggles.
let feedsTableSort = { col: 'activity', dir: 'desc' };
const FEED_SORT_NATURAL = {
  source: 'asc', category: 'asc',
  opens: 'desc', saves: 'desc', dismisses: 'desc',
  affinity: 'desc', activity: 'desc',
};

window.sortFeedsTable = function(col) {
  if (feedsTableSort.col === col) {
    feedsTableSort.dir = feedsTableSort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    feedsTableSort.col = col;
    feedsTableSort.dir = FEED_SORT_NATURAL[col] || 'desc';
  }
  renderFeedsTable();
};

window.onFeedUrlInput    = function(v) { feedFormUrl = v; };
window.onFeedSourceInput = function(v) { feedFormSource = v; };
window.onFeedCatChange   = function(v) { feedFormCategory = v; };

function feedFormSetStatus(kind, message) {
  feedFormStatus = { kind, message };
  const el = document.getElementById('feed-form-status');
  if (!el) return;
  el.className = 'feed-status ' + kind;
  el.textContent = message;
}

function feedFormSetDisabled(disabled) {
  ['feed-url-input', 'feed-source-input', 'feed-cat-input', 'feed-validate-btn', 'feed-add-btn']
    .forEach(id => { const e = document.getElementById(id); if (e) e.disabled = disabled; });
}

window.validateFeed = async function() {
  const url = (feedFormUrl || '').trim();
  if (!url) { feedFormSetStatus('err', 'Enter a URL first'); return; }
  feedFormSetStatus('muted', 'Validating…');
  feedFormSetDisabled(true);
  try {
    const res = await fetch(`/feeds/check?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    if (data.ok) {
      const titleNote = data.title ? ` — "${data.title}"` : '';
      feedFormSetStatus('ok', `Valid ${(data.kind || '').toUpperCase()} feed${titleNote}`);
      // Auto-fill source if the user hasn't typed one yet.
      if (!feedFormSource && data.title) {
        feedFormSource = data.title;
        const src = document.getElementById('feed-source-input');
        if (src) src.value = data.title;
      }
    } else {
      feedFormSetStatus('err', data.error || 'Validation failed');
    }
  } catch (e) {
    feedFormSetStatus('err', 'Request failed: ' + (e.message || e));
  } finally {
    feedFormSetDisabled(false);
  }
};

window.addFeed = async function() {
  const url = (feedFormUrl || '').trim();
  const source = (feedFormSource || '').trim();
  const category = (feedFormCategory || '').trim();
  if (!url || !source || !category) {
    feedFormSetStatus('err', 'URL, source, and category are all required');
    return;
  }
  feedFormSetStatus('muted', 'Adding…');
  feedFormSetDisabled(true);
  try {
    const res = await fetch('/feeds', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, source, category }),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
    // Reset the form on success.
    feedFormUrl = ''; feedFormSource = ''; feedFormCategory = '';
    ['feed-url-input', 'feed-source-input'].forEach(id => { const e = document.getElementById(id); if (e) e.value = ''; });
    const cat = document.getElementById('feed-cat-input'); if (cat) cat.value = '';
    feedFormSetStatus('ok', `Added “${data.source}”. New articles will appear after the next scheduled run.`);
    await refreshFeedsList();
  } catch (e) {
    feedFormSetStatus('err', e.message || String(e));
  } finally {
    feedFormSetDisabled(false);
  }
};

window.removeFeed = async function(url) {
  if (!url) return;
  if (!confirm(`Remove this feed?\n\n${url}`)) return;
  // Treat the DELETE as a pending save so an in-flight refreshFromRemote
  // can't apply a stale GET (taken before the delete) and resurrect the
  // ghost row. This piggybacks on the existing race guard.
  pendingRemoteSave = true;
  let succeeded = false;
  try {
    const res = await fetch(`/feeds?url=${encodeURIComponent(url)}`, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    // Server already wiped sourceStats[source] — mirror locally so we don't
    // flash the ghost row before the next state sync.
    if (data.removed && data.removed.source && sharedState.sourceStats) {
      delete sharedState.sourceStats[data.removed.source];
      saveLocalState(sharedState);
    }
    if (data.removed) {
      recentRemoves.push({ feed: data.removed, stats: data.stats || null });
    }
    succeeded = true;
  } catch (e) {
    alert('Failed to remove: ' + (e.message || e));
  } finally {
    pendingRemoteSave = false;
    if (queuedRemoteSave) {
      queuedRemoteSave = false;
      saveSharedState().catch(() => {});
    }
  }
  if (succeeded) {
    await refreshFeedsList();
    renderRecentRemoves();
  }
};

window.undoRemove = async function(idx) {
  const entry = recentRemoves[idx];
  if (!entry) return;
  pendingRemoteSave = true;
  let succeeded = false;
  try {
    // skip_validate — the URL was verified at original-add time and a
    // flaky revalidation shouldn't block an undo.
    const res = await fetch('/feeds?skip_validate=1', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry.feed),
    });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

    // Restore the stats locally and push them up through the normal save
    // path so the server (and any other devices) pick them back up.
    if (entry.stats && entry.feed && entry.feed.source) {
      if (!sharedState.sourceStats) sharedState.sourceStats = {};
      sharedState.sourceStats[entry.feed.source] = entry.stats;
      saveLocalState(sharedState);
    }
    recentRemoves.splice(idx, 1);
    succeeded = true;
  } catch (e) {
    alert('Failed to restore: ' + (e.message || e));
  } finally {
    pendingRemoteSave = false;
    if (queuedRemoteSave) {
      queuedRemoteSave = false;
      saveSharedState().catch(() => {});
    }
  }
  if (succeeded) {
    // Ensure the restored stats reach the server via a fresh PUT.
    if (entry.stats) saveSharedState().catch(() => {});
    await refreshFeedsList();
    renderRecentRemoves();
  }
};

function renderRecentRemoves() {
  const wrap = document.getElementById('recent-removes-wrap');
  if (!wrap) return;
  if (recentRemoves.length === 0) {
    wrap.innerHTML = '';
    return;
  }
  wrap.innerHTML = `
    <div class="recent-removes">
      <div class="recent-removes-label">Recently removed — restorable until page reload</div>
      <div class="recent-removes-items">
        ${recentRemoves.map((entry, i) => `
          <span class="recent-remove-pill">
            <span class="recent-remove-name">${escapeAttr(entry.feed.source || entry.feed.url || '')}</span>
            <button class="recent-remove-undo" onclick="undoRemove(${i})">Restore</button>
          </span>
        `).join('')}
      </div>
    </div>
  `;
}

async function refreshFeedsList() {
  try {
    const res = await fetch('/feeds');
    if (res.ok) feedsList = await res.json();
  } catch (e) {
    // Keep last-known list on failure so the table doesn't blank out.
  }
  renderFeedsTable();
}

// Unified table: configured feeds + sources with recorded activity (the
// latter as "ghost" rows when a feed has been removed but its stats survive).
// Lets the user see "this source has high dismisses" and remove it without
// scrolling to a separate section.
function renderFeedsTable() {
  const wrap = document.getElementById('feed-table-wrap');
  if (!wrap) return;

  const stats = sharedState.sourceStats || {};
  const bySource = new Map(feedsList.map(f => [f.source, f]));
  const allSources = new Set([...bySource.keys(), ...Object.keys(stats)]);

  const rows = [...allSources].map(source => {
    const feed = bySource.get(source);
    const s = stats[source] || { opens: 0, saves: 0, dismisses: 0 };
    let site = null;
    if (feed && feed.url) { try { site = new URL(feed.url).origin; } catch (e) {} }
    return {
      source,
      url: feed ? feed.url : null,
      site,
      category: feed ? feed.category : null,
      opens: s.opens, saves: s.saves, dismisses: s.dismisses,
      affinity: affinityFor(source),
      activity: s.opens + s.saves + s.dismisses,
      isConfigured: !!feed,
    };
  });

  // Ghosts always sit at the bottom regardless of sort — they're historical
  // and not actionable. Within each group (configured / ghost), apply the
  // user's chosen column + direction.
  const dirMult = feedsTableSort.dir === 'desc' ? -1 : 1;
  const sortKey = (r) => {
    const c = feedsTableSort.col;
    if (c === 'source')   return r.source.toLowerCase();
    if (c === 'category') return r.category ? (CATS[r.category]?.label || r.category).toLowerCase() : '￿';
    return r[c]; // numeric
  };
  rows.sort((a, b) => {
    if (a.isConfigured !== b.isConfigured) return a.isConfigured ? -1 : 1;
    const ka = sortKey(a), kb = sortKey(b);
    if (ka < kb) return -dirMult;
    if (ka > kb) return dirMult;
    return a.source.localeCompare(b.source); // stable tie-break
  });

  // Keep the count chip in the section header in sync with the feed list.
  const totalEl = document.getElementById('feed-total-count');
  if (totalEl) totalEl.textContent = `${feedsList.length} configured`;

  if (rows.length === 0) {
    wrap.innerHTML = '<p class="empty" style="padding: 12px 0;">No feeds yet. Add one above.</p>';
    return;
  }

  const fmt1 = (n) => (Math.round(n * 10) / 10).toFixed(1).replace(/\.0$/, '');
  const th = (col, label, numeric = false) => {
    const active = feedsTableSort.col === col;
    const arrow  = active ? (feedsTableSort.dir === 'desc' ? '▼' : '▲') : '';
    return `<th class="sortable${active ? ' active' : ''}${numeric ? ' num' : ''}" onclick="sortFeedsTable('${col}')">${label}<span class="sort-arrow">${arrow}</span></th>`;
  };

  wrap.innerHTML = `
    <table class="stats-table">
      <thead>
        <tr>
          ${th('source', 'Source')}
          ${th('category', 'Category')}
          ${th('opens', 'Opens', true)}
          ${th('saves', 'Saves', true)}
          ${th('dismisses', 'Dismisses', true)}
          ${th('affinity', 'Affinity', true)}
          <th></th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const affClass = r.affinity > 1.05 ? 'aff-up' : r.affinity < 0.95 ? 'aff-down' : 'aff-neutral';
          const z = (n) => n === 0 ? ' zero' : '';
          const catCell = r.category
            ? escapeAttr(CATS[r.category]?.label || r.category)
            : '<span class="cat-dash">—</span>';
          const actionCell = r.isConfigured
            ? `<button class="cat-del" data-url="${escapeAttr(r.url)}" onclick="removeFeed(this.dataset.url)" aria-label="Remove feed" title="Remove feed">✕</button>`
            : '<span class="ghost-tag">removed</span>';
          return `
            <tr${r.isConfigured ? '' : ' class="ghost-row"'}>
              <td>
                ${r.site
                  ? `<a class="feed-cell-name feed-site-link" href="${escapeAttr(r.site)}" target="_blank" rel="noopener" title="Visit ${escapeAttr(r.site)}">${escapeAttr(r.source)}<span class="ext">↗</span></a>`
                  : `<div class="feed-cell-name">${escapeAttr(r.source)}</div>`}
                ${r.url ? `<div class="feed-cell-url" title="${escapeAttr(r.url)}">${escapeAttr(r.url)}</div>` : ''}
              </td>
              <td>${catCell}</td>
              <td class="num${z(r.opens)}">${fmt1(r.opens)}</td>
              <td class="num${z(r.saves)}">${fmt1(r.saves)}</td>
              <td class="num${z(r.dismisses)}">${fmt1(r.dismisses)}</td>
              <td class="num ${affClass}">${r.affinity.toFixed(2)}×</td>
              <td class="actions">${actionCell}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;
}

/* ── Render Runs (pipeline execution log) ─────────────── */
function renderRunsPane(pane) {
  pane.innerHTML = `
    <div class="runs-bar">
      <p class="cfg-help" style="margin:0;">Gather &amp; rank runs in the last 24 hours. Failures are flagged in red.</p>
      <button class="list-btn" onclick="refreshRuns()">Refresh</button>
    </div>
    <div id="runs-wrap"><p class="empty" style="padding:16px 0;">Loading…</p></div>`;
  refreshRuns();
}

async function refreshRuns() {
  const wrap = document.getElementById('runs-wrap');
  if (!wrap) return;
  let runs = [], status = {};
  try {
    const [rr, rs] = await Promise.all([
      fetch('/runs', { cache: 'no-store' }),
      fetch('/status', { cache: 'no-store' }),
    ]);
    runs = await rr.json();
    status = await rs.json();
  } catch (e) {
    wrap.innerHTML = '<p class="empty" style="padding:16px 0;">Could not load run history.</p>';
    return;
  }
  renderRunsTable(wrap, Array.isArray(runs) ? runs : [], status || {});
}
window.refreshRuns = refreshRuns;

function fmtDuration(s) {
  if (s == null) return '—';
  if (s < 60) return `${Math.round(s)}s`;
  return `${Math.floor(s / 60)}m ${Math.round(s % 60)}s`;
}

// Derive Ollama health from a run's scoring metrics: distinguishes Ollama being
// down (many fallbacks), running on CPU (model not in VRAM / high latency), and
// healthy. Returns null when the run did no scoring (empty / carried-only).
function runHealth(r) {
  const sc = r.scored_count || 0;
  if (!sc) return null;
  const fb = r.score_fallbacks || 0;
  const avgS = r.avg_score_ms != null ? r.avg_score_ms / 1000 : null;
  const gpu = r.gpu_ratio;                       // null if unknown
  const per = avgS != null ? `${avgS.toFixed(1)}s/story` : '';
  if (fb >= Math.max(3, sc * 0.5))
    return { level: 'bad', label: 'Ollama down?', detail: `${fb}/${sc} scoring calls failed — Ollama may be down (restart it)` };
  if (fb > 0)
    return { level: 'warn', label: `${fb} errors`, detail: `${fb}/${sc} scoring calls failed${per ? ' · ' + per : ''}` };
  if (gpu != null && gpu < 0.9)
    return { level: 'bad', label: 'on CPU', detail: `chat model only ${Math.round(gpu * 100)}% in VRAM${per ? ' · ' + per : ''} — GPU dropped?` };
  if (avgS != null && avgS >= 12)
    return { level: 'warn', label: 'slow', detail: `${per} — possibly running on CPU` };
  return { level: 'ok', label: per || 'ok', detail: gpu === 1 ? 'model on GPU' : '' };
}

function renderRunsTable(wrap, runs, status) {
  const cutoff = Date.now() - 24 * 3600 * 1000;
  const recent = runs
    .filter(r => { const t = Date.parse(r.started_at); return !isNaN(t) && t >= cutoff; })
    .sort((a, b) => Date.parse(b.started_at) - Date.parse(a.started_at));

  const liveRow = status && status.running ? `
    <tr class="run-live">
      <td>${status.started_at ? formatDateTime(status.started_at) : 'now'}</td>
      <td><span class="run-badge running">running${status.phase ? ' · ' + status.phase : ''}</span></td>
      <td class="num">—</td>
      <td class="num">${status.feed_count == null ? '—' : status.feed_count}</td>
      <td class="num">—</td>
      <td class="num">—</td>
      <td>—</td>
    </tr>` : '';

  if (!recent.length && !liveRow) {
    wrap.innerHTML = '<p class="empty" style="padding:16px 0;">No runs in the last 24 hours.</p>';
    return;
  }

  // Health banner from the most recent run that actually scored via Ollama.
  const lastScored = recent.find(r => (r.scored_count || 0) > 0);
  const h = lastScored ? runHealth(lastScored) : null;
  const banner = !h ? '' :
    h.level !== 'ok'
      ? `<div class="run-banner ${h.level}">⚠ Ollama ${h.label} — ${h.detail}</div>`
      : `<div class="run-banner ok">✓ Ollama healthy — last run ${h.label}${h.detail ? ', ' + h.detail : ''}</div>`;

  const failures = recent.filter(r => r.status === 'failed').length;
  const badge = (r) =>
    r.status === 'ok'     ? '<span class="run-badge ok">OK</span>' :
    r.status === 'failed' ? '<span class="run-badge fail">Failed</span>' :
                            '<span class="run-badge empty">No new</span>';
  const cell = (v) => (v == null ? '—' : v);
  const ollamaCell = (r) => {
    const hh = runHealth(r);
    if (!hh) return '<span class="run-ollama na">—</span>';
    return `<span class="run-ollama ${hh.level}" title="${escapeAttr(hh.detail || hh.label)}">${hh.label}</span>`;
  };

  wrap.innerHTML = `
    ${banner}
    <div class="run-summary">${recent.length} run${recent.length === 1 ? '' : 's'} in the last 24h${failures ? ` · <span class="run-fail-note">${failures} failed</span>` : ''}</div>
    <table class="stats-table runs-table">
      <thead>
        <tr><th>Started</th><th>Result</th><th class="num">Took</th><th class="num">Feeds</th><th class="num">Gathered</th><th class="num">In digest</th><th>Ollama</th></tr>
      </thead>
      <tbody>
        ${liveRow}
        ${recent.map(r => `
          <tr>
            <td>${formatDateTime(r.started_at)}</td>
            <td>${badge(r)}${r.error ? `<div class="run-err" title="${escapeAttr(r.error)}">${escapeAttr(r.error)}</div>` : ''}</td>
            <td class="num">${fmtDuration(r.duration_s)}</td>
            <td class="num">${cell(r.feed_count)}</td>
            <td class="num">${cell(r.new_count)}</td>
            <td class="num">${cell(r.article_count)}</td>
            <td>${ollamaCell(r)}</td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

  if (j < 0 || j >= catEditList.length) return;
  [catEditList[i], catEditList[j]] = [catEditList[j], catEditList[i]];
  drawCatEditor();
};
window.deleteCat = (i) => { catEditList.splice(i, 1); drawCatEditor(); };
window.addCat = () => { catEditList.push({ key: '', label: '', color: '#8a90a0', interest: '' }); drawCatEditor(); };

window.saveCategories = async () => {
  const cleaned = catEditList.map(c => ({
    key: (c.key || '').trim().toLowerCase(),
    label: (c.label || '').trim(),
    color: c.color || '#8a90a0',
    interest: (c.interest || '').trim(),
  })).filter(c => c.key);
  const keys = cleaned.map(c => c.key);
  if (!cleaned.length) return setCfgStatus('cats', 'err', 'Add at least one category.');
  if (new Set(keys).size !== keys.length) return setCfgStatus('cats', 'err', 'Keys must be unique.');
  if (keys.some(k => !/^[a-z0-9]{1,20}$/.test(k))) return setCfgStatus('cats', 'err', 'Keys: lowercase letters/numbers only, no spaces.');
  if (cleaned.some(c => !c.label)) return setCfgStatus('cats', 'err', 'Every category needs a label.');
  setCfgStatus('cats', 'muted', 'Saving…');
  try {
    const res = await fetch('/categories', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cleaned) });
    if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e.error || ('HTTP ' + res.status)); }
    const saved = await res.json();
    catEditList = saved.map(c => ({ ...c }));
    buildCats(saved);   // nav + card colours update live for when you return to Home
    drawCatEditor();
    setCfgStatus('cats', 'ok', 'Saved — applies on the next run.');
  } catch (e) { setCfgStatus('cats', 'err', e.message || String(e)); }
};

/* ── OPML import wizard ───────────────────────────────── */
let opmlFeeds = [];      // [{url, source, folder}] parsed from the file
let opmlFolders = [];    // distinct folder names, in order
let opmlMap = {};        // folder -> existing category key | '__create__' | '__skip__'
let opmlValidate = true;

const CAT_PALETTE = ['#7b5cff','#2b7fff','#ff5a3c','#10b981','#d98a3b','#e84d9c',
                     '#3fae46','#06b6d4','#8a90a0','#e8482b','#f59e0b','#14b8a6'];
const slugKey = s => (s || '').toLowerCase().replace(/[^a-z0-9]/g, '').slice(0, 20);
function pickCatColor(used) {
  for (const c of CAT_PALETTE) if (!used.has(c)) return c;
  return CAT_PALETTE[(opmlFolders.length) % CAT_PALETTE.length];
}

// Parse an OPML/XML string into feeds with their folder (category) name.
function parseOpml(text) {
  const doc = new DOMParser().parseFromString(text, 'application/xml');
  if (doc.querySelector('parsererror')) throw new Error('That doesn’t look like a valid OPML/XML file.');
  const out = [], seen = new Set();
  doc.querySelectorAll('outline[xmlUrl]').forEach(o => {
    const url = (o.getAttribute('xmlUrl') || '').trim();
    if (!url || seen.has(url)) return;
    seen.add(url);
    const source = (o.getAttribute('title') || o.getAttribute('text') || url).trim();
    const p = o.parentElement;
    const folder = (p && p.tagName.toLowerCase() === 'outline' && !p.getAttribute('xmlUrl'))
      ? (p.getAttribute('title') || p.getAttribute('text') || '').trim() : '';
    out.push({ url, source, folder });
  });
  return out;
}

window.onOpmlFile = function(input) {
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    let feeds;
    try { feeds = parseOpml(reader.result); }
    catch (e) { alert(e.message || 'Could not parse the file.'); return; }
    if (!feeds.length) { alert('No feeds (<outline xmlUrl="…">) were found in that file.'); return; }
    openImportWizard(feeds);
  };
  reader.readAsText(file);
};

function openImportWizard(feeds) {
  opmlFeeds = feeds;
  opmlValidate = true;
  const byFolder = {};
  opmlFolders = [];
  for (const f of feeds) {
    if (!(f.folder in byFolder)) { byFolder[f.folder] = []; opmlFolders.push(f.folder); }
    byFolder[f.folder].push(f);
  }
  // Default mapping: reuse an existing category whose key/label matches the
  // folder; otherwise offer to create one from the folder name.
  const existing = Object.keys(CATS).filter(k => k !== 'all');
  opmlMap = {};
  for (const folder of opmlFolders) {
    const s = slugKey(folder);
    const match = existing.find(k => k === s || (CATS[k].label || '').toLowerCase() === folder.toLowerCase());
    opmlMap[folder] = match || '__create__';
  }
  renderImportWizard(byFolder);
}

function opmlCatSelect(i) {
  const folder = opmlFolders[i], cur = opmlMap[folder];
  const opts = Object.keys(CATS).filter(k => k !== 'all')
    .map(k => `<option value="${k}"${cur === k ? ' selected' : ''}>${escapeAttr(CATS[k].label)}</option>`).join('');
  const createLabel = folder || 'Imported';
  return `<select class="cfg-select" onchange="setOpmlMap(${i}, this.value)">
      ${opts}
      <option value="__create__"${cur === '__create__' ? ' selected' : ''}>＋ Create “${escapeAttr(createLabel)}”</option>
      <option value="__skip__"${cur === '__skip__' ? ' selected' : ''}>Skip these</option>
    </select>`;
}

function renderImportWizard(byFolder) {
  const n = opmlFeeds.length, g = opmlFolders.length;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'opml-modal';
  modal.innerHTML = `
    <div class="modal">
      <div class="modal-h">Import OPML</div>
      <div class="modal-help">${n} feed${n === 1 ? '' : 's'} in ${g} group${g === 1 ? '' : 's'}. Map each group to a category — <strong>Create</strong> makes a new one from the folder name (refine its interest description later in Settings → Categories).</div>
      <div class="opml-groups">
        ${opmlFolders.map((folder, i) => `
          <div class="opml-group">
            <div class="opml-group-name">${folder ? escapeAttr(folder) : '<em>(No folder)</em>'} <span class="opml-count">${byFolder[folder].length}</span></div>
            ${opmlCatSelect(i)}
          </div>`).join('')}
      </div>
      <label class="opml-validate"><input type="checkbox" checked onchange="opmlValidate = this.checked"> Validate each feed before adding (slower, but drops dead URLs)</label>
      <div class="modal-actions">
        <span class="cfg-status" id="opml-status"></span>
        <button class="feed-btn" onclick="closeOpmlModal()">Cancel</button>
        <button class="feed-btn primary" id="opml-import-btn" onclick="commitOpmlImport()">Import</button>
      </div>
    </div>`;
  modal.addEventListener('click', e => { if (e.target === modal) closeOpmlModal(); });
  document.body.appendChild(modal);
}

window.setOpmlMap = function(i, v) { opmlMap[opmlFolders[i]] = v; };
window.closeOpmlModal = function() { const m = document.getElementById('opml-modal'); if (m) m.remove(); };
function setOpmlStatus(kind, msg) {
  const el = document.getElementById('opml-status');
  if (el) { el.className = 'cfg-status ' + kind; el.textContent = msg; }
}

window.commitOpmlImport = async function() {
  const btn = document.getElementById('opml-import-btn');
  setOpmlStatus('muted', 'Importing…');
  if (btn) btn.disabled = true;
  try {
    const usedKeys = new Set(Object.keys(CATS).filter(k => k !== 'all'));
    const usedColors = new Set(Object.values(CATS).map(c => c.c).filter(Boolean));
    const newCats = [], folderKey = {};
    for (const folder of opmlFolders) {
      const choice = opmlMap[folder];
      if (choice === '__skip__') continue;
      if (choice === '__create__') {
        let base = slugKey(folder) || 'imported', k = base, n = 2;
        while (usedKeys.has(k)) k = base.slice(0, 18) + n++;
        usedKeys.add(k);
        const color = pickCatColor(usedColors); usedColors.add(color);
        const label = (folder || 'Imported').slice(0, 40);
        newCats.push({ key: k, label, color, interest: label });
        folderKey[folder] = k;
      } else if (CATS[choice]) {
        folderKey[folder] = choice;
      }
    }
    const feeds = opmlFeeds.filter(f => folderKey[f.folder])
      .map(f => ({ url: f.url, source: f.source, category: folderKey[f.folder] }));
    if (!feeds.length) { setOpmlStatus('err', 'Nothing to import — every group is skipped.'); if (btn) btn.disabled = false; return; }

    if (newCats.length) {
      const current = await fetch('/categories', { cache: 'no-store' }).then(r => r.json()).catch(() => []);
      const merged = [...(Array.isArray(current) ? current : []), ...newCats];
      const r = await fetch('/categories', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(merged) });
      if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || ('categories HTTP ' + r.status)); }
      buildCats(await r.json());
    }
    const ir = await fetch('/feeds/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ feeds, validate: opmlValidate }) });
    if (!ir.ok) { const e = await ir.json().catch(() => ({})); throw new Error(e.error || ('import HTTP ' + ir.status)); }
    showOpmlSummary(await ir.json(), newCats.length);
  } catch (e) {
    setOpmlStatus('err', e.message || String(e));
    if (btn) btn.disabled = false;
  }
};

function showOpmlSummary(sum, newCatCount) {
  const fails = [...(sum.failed || []), ...(sum.invalid || [])];
  const modal = document.querySelector('#opml-modal .modal');
  if (!modal) return;
  modal.innerHTML = `
    <div class="modal-h">Import complete</div>
    <p class="opml-summary">Added <strong>${sum.added}</strong> feed${sum.added === 1 ? '' : 's'}${newCatCount ? `, created <strong>${newCatCount}</strong> categor${newCatCount === 1 ? 'y' : 'ies'}` : ''}.
      ${sum.skipped_dupes ? ` Skipped ${sum.skipped_dupes} duplicate${sum.skipped_dupes === 1 ? '' : 's'}.` : ''}
      ${fails.length ? ` ${fails.length} couldn’t be added.` : ''}
      New feeds appear after the next run.</p>
    ${fails.length ? `<div class="opml-fail-list">${fails.slice(0, 40).map(x => `<div class="opml-fail"><span>${escapeAttr(x.source || x.url || '?')}</span> — ${escapeAttr(x.error || 'failed')}</div>`).join('')}</div>` : ''}
    <div class="modal-actions">
      <button class="feed-btn primary" onclick="finishOpmlImport()">Done</button>
    </div>`;
}

/* ── Settings: runtime config (tuning knobs + blocklist) ─ */
let appSettings = null;
let appSettingsSchema = null;
let deployInfo = null;
let availableModels = null;   // { ok, models:[...], error? } from GET /models

async function fetchModels() {
  try {
    const res = await fetch('/models');
    availableModels = await res.json();
  } catch (e) {
    availableModels = { ok: false, models: [], error: String(e) };

// Load whatever the active settings tab needs, once.
async function ensureSettingsData() {
  const tasks = [];
  if (!appSettings) tasks.push(fetchSettings().catch(() => {}));
  if (!availableModels) tasks.push(fetchModels());
  await Promise.all(tasks);
}

async function fetchSettings() {
  const res = await fetch('/settings');
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  appSettings = data.settings;
  appSettingsSchema = data.schema;
  deployInfo = data.deploy;
  return data;
}

async function saveSettings(patch) {
  const res = await fetch('/settings', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(patch),
  });
  if (!res.ok) {
    const d = await res.json().catch(() => ({}));
    throw new Error(d.error || `HTTP ${res.status}`);
  }
  const data = await res.json();
  appSettings = data.settings;
  appSettingsSchema = data.schema;
  deployInfo = data.deploy;
  return data;
}

function setCfgStatus(scope, kind, message) {
  const el = document.getElementById('cfg-status-' + scope);
  if (!el) return;
  el.className = 'cfg-status ' + kind;
  el.textContent = message;
}

function numberField(key, spec, value) {
  const step = spec.type === 'float' ? (spec.step || 0.01) : 1;
  return `<div class="cfg-row">
    <label class="cfg-label" for="cfg-${key}">${spec.label}
      <span class="cfg-help">${spec.help || ''}</span>
    </label>
    <input class="cfg-input" id="cfg-${key}" type="number"
           min="${spec.min}" max="${spec.max}" step="${step}" value="${value}">
  </div>`;
}

function renderNumericGroup(group, title) {
  const entries = Object.entries(appSettingsSchema)
    .filter(([, s]) => s.group === group && s.type !== 'list');
  if (!entries.length) return '';
  return `<div class="settings-section">
    <div class="settings-h">${title}</div>
    <div class="cfg-grid">
      ${entries.map(([key, spec]) => numberField(key, spec, appSettings[key])).join('')}
    </div>
    <div class="cfg-actions">
      <button class="feed-btn primary" onclick="saveConfigGroup('${group}')">Save</button>
      <span class="cfg-status" id="cfg-status-${group}"></span>
    </div>
  </div>`;
}

window.saveConfigGroup = async function(group) {
  const patch = {};
  for (const [key, spec] of Object.entries(appSettingsSchema)) {
    if (spec.group === group && spec.type !== 'list') {
      const el = document.getElementById('cfg-' + key);
      if (el && el.value !== '') {
        patch[key] = spec.type === 'float' ? parseFloat(el.value) : parseInt(el.value, 10);
      }
    }
  }
  setCfgStatus(group, 'muted', 'Saving…');
  try {
    await saveSettings(patch);
    // Reflect any server-side clamping back into the inputs.
    for (const [key, spec] of Object.entries(appSettingsSchema)) {
      if (spec.group === group && spec.type !== 'list') {
        const el = document.getElementById('cfg-' + key);
        if (el) el.value = appSettings[key];
      }
    }
    setCfgStatus(group, 'ok', 'Saved — applies on the next run.');
  } catch (e) {
    setCfgStatus(group, 'err', e.message || String(e));
  }
};

function blockChips(key, terms) {
  if (!terms.length) {
    const msg = key === 'block_topics'
      ? 'No blocked topics yet. (Keyword and built-in spam filtering still apply.)'
      : 'No custom keywords. The built-in spam/deal filter still applies.';
    return `<span class="cfg-empty">${msg}</span>`;
  }
  return terms.map((t, i) =>
    `<span class="kw-chip">${escapeAttr(t)}<button class="kw-chip-x" title="Remove" onclick="removeListItemAt('${key}',${i})">×</button></span>`
  ).join('');
}

// A chip-editable list setting (block_keywords or block_topics).
function chipSection(key, scope, placeholder) {
  const spec = appSettingsSchema[key];
  const terms = appSettings[key] || [];
  return `<div class="settings-section">
    <div class="settings-h">${spec.label} <span class="settings-h-count">${terms.length} active</span></div>
    <div class="settings-help">${spec.help}</div>
    <div class="feed-form" style="max-width:560px;">
      <div class="feed-form-row">
        <input class="feed-input" id="add-${scope}-input" type="text"
               placeholder="${placeholder}"
               onkeydown="if(event.key==='Enter'){event.preventDefault();addListItem('${key}','${scope}');}">
        <button class="feed-btn primary" onclick="addListItem('${key}','${scope}')">Add</button>
      </div>
      <div class="cfg-status" id="cfg-status-${scope}"></div>
    </div>
    <div class="kw-chips">${blockChips(key, terms)}</div>
  </div>`;
}

function renderFiltersPane(pane) {
  pane.innerHTML =
    chipSection('block_keywords', 'kw', 'Add a keyword to block (e.g. cryptocurrency)') +
    chipSection('block_topics', 'topic', 'Add a topic to block (e.g. celebrity gossip)') +
    renderNumericGroup('blocklist', 'Topic blocking');
}

window.addListItem = async function(key, scope) {
  const el = document.getElementById('add-' + scope + '-input');
  const term = (el && el.value || '').trim();
  if (!term) { setCfgStatus(scope, 'err', 'Enter something first'); return; }
  const items = [...(appSettings[key] || []), term];
  setCfgStatus(scope, 'muted', 'Saving…');
  try {
    await saveSettings({ [key]: items });
    renderSettingsPane();
    setCfgStatus(scope, 'ok', 'Saved — applies on the next run.');
  } catch (e) { setCfgStatus(scope, 'err', e.message || String(e)); }
};

window.removeListItemAt = async function(key, index) {
  const items = (appSettings[key] || []).filter((_, i) => i !== index);
  const scope = key === 'block_topics' ? 'topic' : 'kw';
  setCfgStatus(scope, 'muted', 'Saving…');
  try {
    await saveSettings({ [key]: items });
    renderSettingsPane();
    setCfgStatus(scope, 'ok', 'Removed — applies on the next run.');
  } catch (e) { setCfgStatus(scope, 'err', e.message || String(e)); }
};

function renderApplyFooter() {
  return `<div class="settings-section">
    <div class="settings-h">Apply now</div>
    <div class="settings-help">
      Saved settings take effect on the next scheduled run. Trigger one immediately:
    </div>
    <div class="cfg-actions">
      <button class="feed-btn primary" id="refresh-now-btn" onclick="triggerRefresh()">Refresh now</button>
      <span class="cfg-status" id="cfg-status-refresh"></span>
    </div>
  </div>`;
}

window.triggerRefresh = async function() {
  const btn = document.getElementById('refresh-now-btn');
  setCfgStatus('refresh', 'muted', 'Triggering…');
  if (btn) btn.disabled = true;
  try {
    const res = await fetch('/refresh', { method: 'POST' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    setCfgStatus('refresh', 'ok', 'Refresh triggered — watch the header for progress.');
    scheduleStatusPoll(800);   // surface the "Updating…" pill promptly
  } catch (e) {
    setCfgStatus('refresh', 'err', e.message || String(e));
  } finally {
    if (btn) btn.disabled = false;
  }
};

function renderDeploySection() {
  const d = deployInfo || {};
  const rows = [
    ['Ollama host', d.ollama_host],
    ['Port', d.port],
  ];
  return `<div class="settings-section">
    <div class="settings-h">Deployment <span class="settings-h-count">read-only</span></div>
    <div class="settings-help">
      Set in docker-compose at container start. Change it there and restart;
      which models to use is configured in the Models tab.
    </div>
    <table class="stats-table"><tbody>
      ${rows.map(([k, v]) => `<tr><td class="feed-cell-name">${k}</td><td style="color:var(--text2)">${escapeAttr(String(v == null ? '' : v))}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}

window.confirmResetLearning = function() {
  if (confirm('Reset all source affinity counters? This cannot be undone.')) {
    resetLearning();
  }
};

/* ── Background sync ──────────────────────────────────── */
let backgroundSyncTimer = null;
const BACKGROUND_SYNC_MS = 30000;

function startBackgroundSync() {
  // Re-fetch on tab focus / visibility — that's when staleness matters most
  // (you switched back from another device or another tab).
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') refreshFromRemote();
  });
  window.addEventListener('focus', () => refreshFromRemote());
  window.addEventListener('online', () => {
    // Network came back: flush any queued retry immediately and pull fresh state.
    if (syncRetryTimer) { clearTimeout(syncRetryTimer); syncRetryTimer = null; }
    saveSharedState().catch(() => {});
    refreshFromRemote();
  });

  // Slow poll while the tab is visible. Cheap (just one GET) and bounds
  // worst-case staleness for an always-on tab.
  const tick = () => {
    if (document.visibilityState === 'visible') refreshFromRemote();
  };
  backgroundSyncTimer = setInterval(tick, BACKGROUND_SYNC_MS);
}

/* ── Pipeline run status + auto-surface fresh digests ──── */
let loadedGeneratedAt = null;   // generated_at of the digest currently rendered
let pendingDigest = null;       // a newer digest fetched but not yet shown
let pendingNewCount = 0;        // genuinely-new visible stories in pendingDigest
let statusPollTimer = null;
let lastRunning = false;

// How many stories in `data` are actually new to Home: a fresh id (not in the
// current digest), dated today, not already read or saved — then de-duplicated
// the same way the grid is, so the number matches the cards you'll see. This is
// what the pill reports, NOT the digest's raw article_count (which counts every
// article, most of which you've already seen or that collapse into existing
// coverage).
function countNewStories(data) {
  const oldIds = new Set(allArticles.map(a => a.id));
  const inLater = laterIdSet();
  const fresh = (data.articles || []).filter(a =>
    !oldIds.has(a.id) && isToday(a) && !sharedState.readIds.has(a.id) && !inLater.has(a.id));
  return dedupeToReps(fresh).length;
}

function applyDigestData(data) {
  // Order: today's stories first (by score), then recent past (by recency).
  allArticles = (data.articles || []).sort((a, b) => {
    const at = isToday(a) ? 1 : 0, bt = isToday(b) ? 1 : 0;
    if (at !== bt) return bt - at;
    if (at && bt)  return b.score - a.score;
    const ds = new Date(b.published_at) - new Date(a.published_at);
    return ds !== 0 ? ds : b.score - a.score;
  });
  loadedGeneratedAt = data.generated_at || null;
  const genDate = data.generated_at ? new Date(data.generated_at) : new Date();
  document.getElementById('header-date').textContent =
    '— ' + genDate.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

function refreshRunPill(running, phase) {
  const pill = document.getElementById('run-pill');
  if (!pill) return;
  if (running) {
    pill.className = 'run-pill running';
    pill.innerHTML = `<span class="run-spinner"></span>Updating${phase ? ' · ' + phase : ''}`;
    pill.onclick = null;
    pill.style.display = 'inline-flex';
  } else if (pendingDigest) {
    const n = pendingNewCount;
    pill.className = 'run-pill ready';
    // Honest about what will change: a count only when there are genuinely new
    // stories, otherwise just "updated" (re-scored/re-ranked, nothing new).
    pill.textContent = n > 0
      ? `↑ ${n} new ${n === 1 ? 'story' : 'stories'} — refresh`
      : 'Digest updated — refresh';
    pill.onclick = applyPendingDigest;
    pill.style.display = 'inline-flex';
  } else {
    pill.style.display = 'none';
    pill.onclick = null;
  }
}

window.applyPendingDigest = function() {
  if (!pendingDigest) return;
  applyDigestData(pendingDigest);
  pendingDigest = null;
  refreshRunPill(false);
  rerenderActiveView();
  if (currentView === 'digest') window.scrollTo({ top: 0, behavior: 'smooth' });
};

async function checkForNewDigest() {
  try {
    const res = await fetch(DIGEST_URL, { cache: 'no-store' });
    const data = await res.json();
    if (data && data.generated_at && data.generated_at !== loadedGeneratedAt) {
      pendingDigest = data;
      pendingNewCount = countNewStories(data);
      refreshRunPill(false);
    }
  } catch (e) { /* transient; try again next poll */ }
}

function scheduleStatusPoll(delay) {
  if (statusPollTimer) clearTimeout(statusPollTimer);
  statusPollTimer = setTimeout(() => {
    if (document.visibilityState === 'hidden') { scheduleStatusPoll(delay); return; }
    pollStatus();
  }, delay);
}

async function pollStatus() {
  let st = null;
  try { const r = await fetch('/status', { cache: 'no-store' }); st = await r.json(); } catch (e) {}
  const running = !!(st && st.running);
  refreshRunPill(running, st && st.phase);
  // Keep the Runs log live while it's open (updates the in-progress row and
  // surfaces a run the moment it lands or fails).
  if (currentView === 'settings' && settingsTab === 'runs') refreshRuns();
  // A run just finished — see if it produced a fresh digest to surface.
  if (lastRunning && !running) await checkForNewDigest();
  lastRunning = running;
  // Poll fast while a run is active, slow when idle.
  scheduleStatusPoll(running ? 3000 : 25000);
}

/* ── Load digest.json + state in parallel ────────────── */
async function loadDigest() {
  const statusEl = document.getElementById('status-screen');
  const pageEl   = document.querySelector('.page');
  const markDone = (id) => document.getElementById(id)?.classList.add('done');

  const digestPromise = (async () => {
    const res = await fetch(DIGEST_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    markDone('sync-digest');
    return data;
  })();

  const statePromise = (async () => {
    const remote = await loadRemoteState();
    markDone('sync-state');
    return remote;
  })();

  const catsPromise = (async () => {
    try { const r = await fetch('/categories', { cache: 'no-store' }); return await r.json(); }
    catch (e) { return null; }
  })();

  try {
    const [data, remoteState, cats] = await Promise.all([digestPromise, statePromise, catsPromise]);

    buildCats(cats);   // before any render so nav/colors reflect the config
    applyDigestData(data);

    // Server is the source of truth. If we got it, replace whatever
    // localStorage had (stale local state was the iPad-resurrection bug).
    // If the server is unreachable, fall back to local cache so the app
    // still renders something offline.
    applySharedState(remoteState || loadLocalState());
    // Apply any pending time-decay on the source-affinity counters once the
    // canonical state has landed; persists asynchronously if it ran.
    if (maybeDecayLearning()) saveSharedState().catch(() => {});
    saveLocalState(sharedState);

    setActiveView(currentView);
    buildCatNav();
    updateCatCounts();
    updateBadges();
    if (currentView === 'history')       renderHistory();
    else if (currentView === 'later')    renderLater();
    else if (currentView === 'settings') renderSettings();
    else render();

    statusEl.style.display = 'none';
    pageEl.classList.remove('not-ready');

    startBackgroundSync();
    scheduleStatusPoll(2000);   // begin watching pipeline runs
  } catch(err) {
    statusEl.innerHTML = `<div style="text-align:center;">
      <div style="font-size:13px;color:var(--text3);margin-bottom:8px;">Could not load digest</div>
      <div style="font-size:12px;color:var(--text3);">${err.message}</div>
    </div>`;
  }
}

loadDigest();
</script>
